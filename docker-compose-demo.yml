name: afw-demo

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: demo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPORT: ${DB_PORT}
    ports:
      - "127.0.0.1:${DB_PORT}:${DB_PORT}"
    volumes:
      - ./postgres_data_demo:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 384M
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.demo
    container_name: demo-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USERS=ai_gateway_users
      - DB_DATA=ai_gateway_data
      - DB_LOGS=ai_gateway_logs
      - LOG_STORE_DRIVER=postgresql
      - LOG_PG_HOST=postgres
      - LOG_PG_PORT=${DB_PORT}
      - LOG_PG_USER=${LOG_PG_USER}
      - LOG_PG_PASSWORD=${LOG_PG_PASSWORD}
      - LOG_PG_DB=ai_gateway_logs
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRES=15m
      - JWT_REFRESH_EXPIRES=7d
      - PORT=3635
      - NODE_ENV=production
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - GATEWAY_API_KEY_GRACE_PERIOD=${GATEWAY_API_KEY_GRACE_PERIOD:-86400}
      - PLATFORM_KEY_SECRET=${PLATFORM_KEY_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3635/health"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.demo
      args:
        - VITE_BUILD_TYPE=demo
    container_name: demo-frontend
    ports:
      - "0.0.0.0:3634:80"
      - "0.0.0.0:3635:443"
      - "0.0.0.0:8083:8083"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  gateway-engine:
    build:
      context: ./gateway-engine
      dockerfile: Dockerfile
    container_name: demo-gateway
    expose:
      - "8082"
    environment:
      - LOG_PG_HOST=postgres
      - LOG_PG_PORT=${DB_PORT}
      - LOG_PG_USER=${LOG_PG_USER}
      - LOG_PG_PASSWORD=${LOG_PG_PASSWORD}
      - LOG_PG_DB=ai_gateway_logs
      - DATA_PG_HOST=postgres
      - DATA_PG_PORT=${DB_PORT}
      - DATA_PG_USER=${DB_USER}
      - DATA_PG_PASSWORD=${DB_PASSWORD}
      - DATA_PG_DB=ai_gateway_data
      - PLATFORM_KEY_SECRET=${PLATFORM_KEY_SECRET}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM}
      - PREAUTH_RATE_LIMIT_RPM=${PREAUTH_RATE_LIMIT_RPM:-300}
      - TRUSTED_PROXY_DEPTH=${TRUSTED_PROXY_DEPTH:-1}
      - TRUSTED_PROXY_IPS=${TRUSTED_PROXY_IPS:-172.16.0.0/12}
      - SCAN_FAIL_CLOSED=${SCAN_FAIL_CLOSED:-false}
      - SSRF_PRIVATE_ALLOWED=${SSRF_PRIVATE_ALLOWED:-true}
      - GATEWAY_INSTANCE_ID=${GATEWAY_INSTANCE_ID}
      - RESPONSE_CACHE_ENABLED=${RESPONSE_CACHE_ENABLED:-false}
      - RESPONSE_CACHE_MAX_TTL_SECONDS=${RESPONSE_CACHE_MAX_TTL_SECONDS:-900}
      - RESPONSE_CACHE_DEFAULT_TTL_SECONDS=${RESPONSE_CACHE_DEFAULT_TTL_SECONDS:-300}
      - RESPONSE_CACHE_CLEANUP_INTERVAL_SECONDS=${RESPONSE_CACHE_CLEANUP_INTERVAL_SECONDS:-120}
      - RESPONSE_CACHE_LOOKUP_TIMEOUT_MS=${RESPONSE_CACHE_LOOKUP_TIMEOUT_MS:-50}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-gateway-engine}
      - OTEL_TRACES_SAMPLER=${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}
      - OTEL_TRACES_SAMPLER_ARG=${OTEL_TRACES_SAMPLER_ARG:-0.1}
      - DEPLOYMENT_ENV=${DEPLOYMENT_ENV:-docker}
      - RUST_LOG=${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_started
      backend:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 256M
        reservations:
          cpus: '0.5'
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

