events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    upstream backend {
        server backend:3635;
    }

    server {
        listen 80;
        server_name c6web.local;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name c6web.local;
        root /usr/share/nginx/html;
        index index.html;

        ssl_certificate /etc/nginx/certs/demo1.c6web.com.crt;
        ssl_certificate_key /etc/nginx/certs/demo1.c6web.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cookie_domain off;
            proxy_cookie_path / /;
            proxy_pass_header Set-Cookie;
        }
    }

    # Gateway engine proxy — used by backend for cache reload (via gateway instance URL)
    # Uses runtime DNS resolution so nginx starts even if gateway-engine is down
    server {
        listen 8083 ssl;
        server_name c6web.local;

        ssl_certificate /etc/nginx/certs/demo1.c6web.com.crt;
        ssl_certificate_key /etc/nginx/certs/demo1.c6web.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        resolver 127.0.0.11 valid=10s;
        set $gateway_url http://gateway-engine:8082;

        location / {
            proxy_pass $gateway_url;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Gateway's resolve_source_ip() expects each trusted hop to append its own
            # address (not just relay $remote_addr) so it can peel off proxy hops by
            # TRUSTED_PROXY_DEPTH. $server_addr is this nginx's own address.
            proxy_set_header X-Forwarded-For "$proxy_add_x_forwarded_for,$server_addr";
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
